<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Leaderboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light py-5">
    <!-- Full-screen Loading Overlay -->
    <div id="loadingOverlay" class="d-none">
        <div class="spinner-border text-info" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div class="container">
        <h1 class="text-center text-info mb-5">🏆 Image Leaderboard</h1>

        <div class="row justify-content-center mb-5">
            <div class="col-md-8 col-lg-6">
                <form id="submitForm" class="bg-secondary bg-opacity-25 p-4 rounded border border-secondary">
                    <div class="mb-3">
                        <label for="name" class="form-label text-light">이름 (최대 10자)</label>
                        <input id="name" type="text" class="form-control bg-dark text-light border-secondary" placeholder="홍길동" maxlength="10" required />
                    </div>
                    <div class="mb-3">
                        <label for="image_file" class="form-label text-light">이미지 첨부</label>
                        <input id="image_file" type="file" accept="image/*" class="form-control bg-dark text-light border-secondary" required />
                    </div>
                    <div class="mb-3">
                        <label for="prompt" class="form-label text-light">프롬프트 (최대 50자)</label>
                        <textarea id="prompt" class="form-control bg-dark text-light border-secondary" rows="3" placeholder="사용한 프롬프트를 입력하세요" maxlength="50" required></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" id="submitBtn" class="btn btn-info text-white fw-bold">제출</button>
                    </div>
                    <div id="status" class="mt-3 text-center fw-semibold"></div>
                </form>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h5 text-secondary mb-0">전체 순위</h2>
                    <div class="btn-group" role="group" aria-label="정렬 버튼 그룹">
                        <button id="sortLatestBtn" class="btn btn-info btn-sm text-white fw-bold">최신순 보기</button>
                        <button id="sortPromptBtn" class="btn btn-outline-info btn-sm">프롬프트 점수 순 보기</button>
                        <button id="sortImageBtn" class="btn btn-outline-info btn-sm">이미지 점수 순 보기</button>
                        <button id="sortTotalBtn" class="btn btn-outline-info btn-sm">총점 순 보기</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle border-secondary">
                        <thead class="table-secondary border-secondary">
                            <tr>
                                <th>#</th>
                                <th>이름</th>
                                <th>이미지</th>
                                <th>프롬프트</th>
                                <th>프롬프트 점수</th>
                                <th>이미지 점수</th>
                                <th>총점</th>
                                <th>일자</th>
                            </tr>
                        </thead>
                        <tbody id="boardBody">
                            <tr><td colspan="8" class="text-center text-secondary py-3">불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Custom Scripts -->
    <script src="script/leaderboard.js"></script>
    <script src="script/form.js"></script>
</body>
</html>
