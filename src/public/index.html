<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Leaderboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light py-5">
    <!-- Full-screen Loading Overlay -->
    <div id="loadingOverlay" class="d-none">
        <div class="spinner-border text-info" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div class="container">
        <h1 class="text-center text-info mb-5">🏆 Image Leaderboard</h1>

        <div class="row justify-content-center mb-5">
            <div class="col-md-8 col-lg-6">
                <form id="submitForm" class="bg-secondary bg-opacity-25 p-4 rounded border border-secondary">
                    <div class="mb-3">
                        <label for="name" class="form-label text-light">이름</label>
                        <input id="name" type="text" class="form-control bg-dark text-light border-secondary" placeholder="홍길동" required />
                    </div>
                    <div class="mb-3">
                        <label for="image_file" class="form-label text-light">이미지 첨부</label>
                        <input id="image_file" type="file" accept="image/*" class="form-control bg-dark text-light border-secondary" required />
                    </div>
                    <div class="mb-3">
                        <label for="prompt" class="form-label text-light">프롬프트</label>
                        <textarea id="prompt" class="form-control bg-dark text-light border-secondary" rows="3" placeholder="사용한 프롬프트를 입력하세요" required></textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label for="prompt_score" class="form-label text-light">프롬프트 점수</label>
                            <input id="prompt_score" type="number" step="0.01" min="0" max="999.99" class="form-control bg-dark text-light border-secondary" placeholder="0.00" required />
                        </div>
                        <div class="col">
                            <label for="image_score" class="form-label text-light">이미지 점수</label>
                            <input id="image_score" type="number" step="0.01" min="0" max="999.99" class="form-control bg-dark text-light border-secondary" placeholder="0.00" required />
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" id="submitBtn" class="btn btn-info text-white fw-bold">제출</button>
                    </div>
                    <div id="status" class="mt-3 text-center fw-semibold"></div>
                </form>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <h2 class="h5 text-secondary mb-3">전체 순위</h2>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle border-secondary">
                        <thead class="table-secondary border-secondary">
                            <tr>
                                <th>#</th>
                                <th>이름</th>
                                <th>이미지명</th>
                                <th>프롬프트</th>
                                <th id="sortPromptBtn" style="cursor: pointer;" title="프롬프트 점수로 정렬">프롬프트 점수 ↕️</th>
                                <th id="sortImageBtn" style="cursor: pointer;" title="이미지 점수로 정렬">이미지 점수 ↕️</th>
                                <th>일자</th>
                            </tr>
                        </thead>
                        <tbody id="boardBody">
                            <tr><td colspan="7" class="text-center text-secondary py-3">불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
