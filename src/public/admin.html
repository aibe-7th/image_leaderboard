<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Admin - Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2rem;
            margin-top: 2rem;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #0dcaf0;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
        }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="text-center text-info mb-4">⚙️ Challenge Management</h1>
                
                <div class="admin-card">
                    <div class="mb-4">
                        <label class="form-label">관리자 비밀번호</label>
                        <input type="password" id="adminPass" class="form-control" placeholder="CHALLENGE_PASS를 입력하세요">
                    </div>

                    <hr class="opacity-25 my-4">

                    <form id="challengeForm">
                        <div class="mb-3">
                            <label class="form-label">정답 프롬프트</label>
                            <textarea id="prompt" class="form-control" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">정답 이미지</label>
                            <input type="file" id="image_file" class="form-control" accept="image/*" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">시작일</label>
                                <input type="date" id="start_date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">종료일</label>
                                <input type="date" id="end_date" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">노출 여부</label>
                            <select id="show_yn" class="form-select bg-dark text-light border-secondary">
                                <option value="Y">노출 (Y)</option>
                                <option value="N">숨김 (N)</option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-info text-white fw-bold py-2">챌린지 등록</button>
                        </div>
                    </form>
                    <div id="status" class="mt-3 text-center"></div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="index.html" class="text-secondary text-decoration-none">← 메인 리더보드로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const challengeForm = document.getElementById('challengeForm');
        const statusDiv = document.getElementById('status');

        challengeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('adminPass').value;
            if (!password) {
                alert('비밀번호를 입력해주세요.');
                return;
            }

            const formData = new FormData();
            formData.append('prompt', document.getElementById('prompt').value);
            formData.append('image_file', document.getElementById('image_file').files[0]);
            formData.append('start_date', document.getElementById('start_date').value);
            formData.append('end_date', document.getElementById('end_date').value);
            formData.append('show_yn', document.getElementById('show_yn').value);

            statusDiv.className = 'mt-3 text-info';
            statusDiv.textContent = '처리 중...';

            try {
                const response = await axios.post('/api/admin/challenge', formData, {
                    headers: {
                        'Admin-Password': password,
                        'Content-Type': 'multipart/form-data'
                    }
                });
                statusDiv.className = 'mt-3 text-success';
                statusDiv.textContent = '✅ 등록 성공!';
                challengeForm.reset();
            } catch (error) {
                console.error(error);
                statusDiv.className = 'mt-3 text-danger';
                statusDiv.textContent = '❌ 실패: ' + (error.response?.data?.error || '알 수 없는 오류');
            }
        });
    </script>
</body>
</html>
